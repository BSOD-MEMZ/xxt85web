<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>搜索 · xxtsoft</title>
    <meta name="description" content="搜索xxt8582753（BSOD-MEMZ）的个人网站内容">
    <link rel="icon" href="search.ico" type="image/x-icon">
    <link rel="stylesheet" href="style.css" type="text/css" id="themeCss" />
    <script src="js/theme-loader.js"></script>
</head>

<body>

    <div class="titlebar">
        <div class="wrap">
            <h1>xxtsoft.top</h1>
        </div>
    </div>

    <div class="navbar">
        <div class="wrap">
            <ul>
                <li><a href="index.html">首页(H)</a></li>
                <li><a href="articles.html">文章(A)</a></li>
                <li><a href="downloads.html">下载(D)</a></li>
                <li><a href="medias.html">多媒体(M)</a></li>
                <li><a href="about.html">关于(A)</a></li>
            </ul>
        </div>
    </div>

    <div class="content wrap">
        <div class="main">
            <h2><span style="color: #003399;">搜索</span></h2>
            <div class="window">
                <div class="window-titlebar">搜索文件</div>
                <div class="window-content">
                    <div class="search-container">
                        <div class="search-box">
                            <input type="text" id="searchInput" placeholder="在 xxtsoft.top 搜索">
                            <button id="searchButton">搜索</button>
                        </div>
                    </div>
                  

                    <div id="categoryFilters" style="margin-bottom: 10px;">
                        <button class="cat-btn active" data-cat="all">全部</button>
                        <button class="cat-btn" data-cat="article"><img src="images/icons/articles.png" alt="" width="16" height="16" style="vertical-align:middle;margin-right:3px;">文章</button>
                        <button class="cat-btn" data-cat="program"><img src="images/icons/program.png" alt="" width="16" height="16" style="vertical-align:middle;margin-right:3px;">程序</button>
                        <button class="cat-btn" data-cat="media"><img src="images/icons/downvideo.png" alt="" width="16" height="16" style="vertical-align:middle;margin-right:3px;">媒体</button>
                    </div>
                    <div id="resultCount" style="font-size:12px; color:#666; margin-bottom:8px;"></div>

                    <div id="searchResults" class="search-results">
                        <div id="catArticle" class="result-category">
                            <h3><img src="images/icons/articles.png" alt="" width="16" height="16"> 文章</h3>
                            <ul class="article-list" id="articleList"></ul>
                        </div>
                        <div id="catProgram" class="result-category">
                            <h3><img src="images/icons/program.png" alt="" width="16" height="16"> 程序</h3>
                            <ul class="article-list" id="programList"></ul>
                        </div>
                        <div id="catMedia" class="result-category">
                            <h3><img src="images/icons/downvideo.png" alt="" width="16" height="16"> 媒体</h3>
                            <ul class="article-list" id="mediaList"></ul>
                        </div>
                    </div>
                    <div class="no-results" id="noResults" style="display:none;"><div style="text-align:center;padding:30px 0;"><img src="images/nothing.png" alt="" style="width:96px;height:96px;"><p style="color:#666;margin-top:12px;">什么都没找到啊＞﹏＜</p></div></div>
                </div>
            </div>
        </div>
        <div class="clear"></div>
    </div>
</body>
<script src="js/search-data.js"></script>
<script src="js/search-logic.js"></script>
</html>
