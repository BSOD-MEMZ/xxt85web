            <div class="tips">
                <p><img src="images/icons/info.png" alt="" width="16" height="16"
                        style="vertical-align: middle;" /><b> 为什么我会被跳转到这里？</b></p>
                <p>如果你点击了一个正在维护的链接，或者我认为你需要休息一下，可能会被跳转到此页面————这里并不是404，只是你我都没准备好。</p>

<script>
    const urlParams = new URLSearchParams(window.location.search);
    const text = urlParams.get('text');

    if (text) {
        document.getElementById('display').innerText = decodeURIComponent(text);
    } else {
        document.getElementById('display').innerText = '没有传入任何内容';
    }
</script>
